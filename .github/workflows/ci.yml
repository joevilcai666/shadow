name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Build web assets
        run: cd web && npm run build

      - name: Build Go binary
        run: go build -o shadow ./cmd/shadow/

      - name: Verify version command
        run: ./shadow version

      - name: Run Go tests
        run: go test -v -race ./...

      - name: Run Go vet
        run: go vet ./...
