<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#A5B4FC"/>
    </linearGradient>
    <linearGradient id="termBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16162a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <rect width="40" height="40" fill="none"/>
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Terminal window -->
  <rect x="140" y="60" width="1000" height="520" rx="12" fill="url(#termBg)" stroke="#6D28D9" stroke-width="2" filter="url(#shadow)"/>

  <!-- Title bar -->
  <rect x="140" y="60" width="1000" height="40" rx="12" fill="#1e1e3a"/>
  <rect x="140" y="88" width="1000" height="12" fill="#1e1e3a"/>
  <line x1="140" y1="100" x2="1140" y2="100" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="172" cy="80" r="7" fill="#EF4444"/>
  <circle cx="196" cy="80" r="7" fill="#EAB308"/>
  <circle cx="220" cy="80" r="7" fill="#22C55E"/>

  <!-- Title bar text -->
  <text x="640" y="85" text-anchor="middle" fill="#6B7280" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">shadow start</text>

  <!-- Pipeline progress bar -->
  <!-- ✓ Setup -->
  <circle cx="370" cy="132" r="5" fill="#22C55E"/>
  <text x="382" y="136" fill="#22C55E" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="11">Setup</text>
  <line x1="420" y1="132" x2="460" y2="132" stroke="#22C55E" stroke-width="2"/>

  <!-- ✓ Privacy -->
  <circle cx="470" cy="132" r="5" fill="#22C55E"/>
  <text x="482" y="136" fill="#22C55E" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="11">Privacy</text>
  <line x1="535" y1="132" x2="575" y2="132" stroke="#22C55E" stroke-width="2"/>

  <!-- ● Agents (current) -->
  <circle cx="585" cy="132" r="5" fill="#A855F7"/>
  <text x="597" y="136" fill="#A855F7" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="11" font-weight="bold">Agents</text>
  <line x1="650" y1="132" x2="690" y2="132" stroke="#6B7280" stroke-width="2"/>

  <!-- ○ Memory -->
  <circle cx="700" cy="132" r="5" fill="none" stroke="#6B7280" stroke-width="1.5"/>
  <text x="712" y="136" fill="#6B7280" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="11">Memory</text>

  <!-- SHADOW ASCII Art — pixel-rendered with rects -->
  <!-- Using 8x10 blocks per character cell. Each "█" = filled rect, space = empty -->
  <!-- Source: figlet "ANSI Shadow" font from banner.go -->
  <!-- Line 1: " ██████  ██   ██  █████   ██████  ██████   ██████  ██     ██ " -->
  <!-- pixel size: 7w × 12h, gap 0, starting at x=220, each row offset y+44 -->

  <!-- Row 1 y=170 -->
  <rect x="292" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="306" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="320" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="334" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="348" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="362" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="390" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="404" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="432" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="446" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="474" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="488" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="502" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="516" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="530" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="558" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="572" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="586" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="600" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="614" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="628" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="656" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="670" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="684" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="698" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="712" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="726" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="768" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="782" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="796" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="810" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="824" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="838" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="866" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="880" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="908" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="922" y="170" width="7" height="12" fill="url(#textGrad)"/>
  <rect x="936" y="170" width="7" height="12" fill="url(#textGrad)"/>

  <!-- Using text approach instead for cleaner rendering -->
  <!-- Clear pixel rects above, use monospace text blocks -->
  <rect x="220" y="160" width="840" height="80" fill="url(#termBg)"/>

  <text font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" font-size="22" font-weight="bold" fill="url(#textGrad)" filter="url(#glow)">
    <tspan x="230" dy="0"> ██████  ██   ██  █████   ██████  ██████   ██████  ██     ██</tspan>
  </text>
  <text font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" font-size="22" font-weight="bold" fill="url(#textGrad)" filter="url(#glow)">
    <tspan x="230" dy="26">██       ██   ██ ██   ██ ██    ██ ██   ██ ██    ██ ██     ██</tspan>
  </text>
  <text font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" font-size="22" font-weight="bold" fill="url(#textGrad)" filter="url(#glow)">
    <tspan x="230" dy="26">███████  ███████ ███████ ██    ██ ██   ██ ██    ██ ██  █  ██</tspan>
  </text>
  <text font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" font-size="22" font-weight="bold" fill="url(#textGrad)" filter="url(#glow)">
    <tspan x="230" dy="26">     ██ ██   ██ ██   ██ ██    ██ ██   ██ ██    ██ ██ ███ ██</tspan>
  </text>
  <text font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" font-size="22" font-weight="bold" fill="url(#textGrad)" filter="url(#glow)">
    <tspan x="230" dy="26"> ██████ ██   ██ ██   ██  ██████  ██████   ██████   ███ ███</tspan>
  </text>

  <!-- Tagline -->
  <text x="640" y="340" text-anchor="middle" fill="#E0D4FF" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16" letter-spacing="3" opacity="0.8">correct once, remember everywhere</text>

  <!-- Divider line -->
  <line x1="320" y1="365" x2="960" y2="365" stroke="#6D28D9" stroke-width="1" opacity="0.4"/>

  <!-- Agent selection UI -->
  <text x="260" y="400" fill="#FFFFFF" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" font-weight="bold">Select Agents</text>

  <text x="260" y="430" fill="#6B7280" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="12">Detected 2 agent(s) on your machine:</text>

  <!-- Agent item 1 - selected, focused -->
  <text x="260" y="458" fill="#818CF8" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">▸</text>
  <text x="280" y="458" fill="#22C55E" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">●</text>
  <text x="300" y="458" fill="#FFFFFF" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">Claude Code</text>
  <text x="432" y="458" fill="#6B7280" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">→ writes to CLAUDE.md</text>

  <!-- Agent item 2 - selected -->
  <text x="260" y="480" fill="#6B7280" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13"> </text>
  <text x="280" y="480" fill="#22C55E" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">●</text>
  <text x="300" y="480" fill="#E5E7EB" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">Cursor</text>
  <text x="432" y="480" fill="#6B7280" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">→ writes to .cursorrules</text>

  <!-- Agent item 3 - not selected -->
  <text x="280" y="502" fill="#6B7280" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">○</text>
  <text x="300" y="502" fill="#6B7280" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">GitHub Copilot</text>
  <text x="432" y="502" fill="#4B5563" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">→ .github/copilot-instructions.md</text>

  <!-- Agent item 4 - not selected -->
  <text x="280" y="524" fill="#6B7280" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">○</text>
  <text x="300" y="524" fill="#6B7280" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">Codex</text>
  <text x="432" y="524" fill="#4B5563" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">→ writes to AGENTS.md</text>

  <!-- Keyboard hints -->
  <text x="260" y="558" fill="#6B7280" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="11">↑↓ move · Space toggle · Enter confirm</text>

  <!-- Version badge - bottom right -->
  <rect x="1020" y="540" width="80" height="26" rx="13" fill="#22C55E" opacity="0.15"/>
  <text x="1060" y="558" text-anchor="middle" fill="#22C55E" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="12" font-weight="bold">v0.2.0</text>

  <!-- Bottom branding bar -->
  <text x="1140" y="625" text-anchor="end" fill="rgba(255,255,255,0.3)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="10">github.com/joevilcai666/shadow</text>
</svg>